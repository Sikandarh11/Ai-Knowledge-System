app:
  name: Workspace API
  version: 1.0.0
  debug: false
  database_url: sqlite:///./app.db

paths:
  project_root: .
  backend_dir: backend
  secrets_dir: backend/secrets

google_calendar:
  credentials_path: backend/secrets/credentials.json
  token_path: backend/secrets/token.json
  calendar_id: primary
  scopes:
    - https://www.googleapis.com/auth/calendar

scheduler:
  timezone: Asia/Karachi
  work_start_hour: 9
  work_end_hour: 18
  min_slot_minutes: 30
  default_duration_minutes: 30
  max_alternative_days: 7
  max_alternatives: 3
  event_fetch_max_results: 50
  parser_model: gpt-4o-mini
